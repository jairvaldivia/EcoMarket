<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - EcoMarket</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">EcoMarket 🌿</span>
        <a href="index.html" class="btn btn-light">⬅ Volver al inicio</a>
    </div>
</nav>

<!-- CONTENEDOR -->
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-lg formulario">

        <h2 class="text-center mb-3">Contáctanos</h2>
        <p class="text-center text-muted">Déjanos tu mensaje y te responderemos pronto</p>

        <form onsubmit="return validarFormulario()">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: Nestor Valdivia" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" id="email" class="form-control" placeholder="correo@gmail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="tel" id="telefono" class="form-control" placeholder="Escribe su Teléfono" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea id="mensaje" class="form-control" rows="3" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button class="btn btn-success w-100">Enviar mensaje</button>

        </form>

    </div>

</div>

<footer class="text-center bg-success text-white p-2">
    <p>© 2026 EcoMarket</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
